spring.application.name=ai-demo
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# DataSource Config
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/aitest?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC

# Logger Config
logging.level.com.baomidou.mybatisplus.samples.quickstart=debug